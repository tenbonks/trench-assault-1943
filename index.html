<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trench Assault</title>
<style>
  :root{
    --mud:#241e15; --chalk:#d8d2c0; --dim:#8f8877; --line:#4a4133;
    --ally:#a8ae5c; --foe:#98a0aa; --neutral:#b8ad8f;
    --alert:#c25b45; --gas:#b8bd4e; --panel:#1a1610; --panel-2:#211c14;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:radial-gradient(ellipse at 50% -20%, #33291b 0%, var(--mud) 60%);
    color:var(--chalk);
    font-family:"Courier New",Courier,monospace;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:12px;
    -webkit-user-select:none; user-select:none;
  }
  h1{
    font-size:15px; letter-spacing:9px; text-transform:uppercase;
    color:var(--dim); margin-bottom:10px; font-weight:normal;
    display:flex; align-items:center; gap:14px;
  }
  h1::before,h1::after{content:""; height:1px; width:60px; background:var(--line)}
  #wrap{width:100%; max-width:960px; box-shadow:0 18px 50px rgba(0,0,0,.55)}
  svg{display:block}

  /* ---------- top HUD ---------- */
  #hud{
    display:flex; justify-content:space-between; align-items:stretch; gap:10px;
    background:linear-gradient(var(--panel-2),var(--panel));
    border:1px solid var(--line); border-bottom:1px solid #0e0b07;
    padding:8px 12px;
  }
  .hud-group{display:flex; align-items:center; gap:10px}
  .res{
    display:flex; align-items:center; gap:8px; padding:0 10px;
    border:1px solid #3a3226; background:rgba(0,0,0,.25);
  }
  .res b{color:var(--ally); font-size:17px; min-width:34px; text-align:right}
  .res .sub{font-size:10px; color:var(--dim); line-height:1.2}
  .ability{
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    width:78px; height:52px; cursor:pointer;
    font-family:inherit; color:var(--chalk);
    background:linear-gradient(#463d2d,#38301f);
    border:1px solid #5c5240; border-bottom-color:#2a2417;
  }
  .ability:hover:not(:disabled){background:linear-gradient(#544a36,#443a26)}
  .ability:disabled{cursor:default}
  .ability:disabled .ic,.ability:disabled .lbl{opacity:.35}
  .ability .lbl{font-size:9.5px; letter-spacing:1px; text-transform:uppercase}
  .ability kbd{
    position:absolute; top:2px; right:4px; font-size:9px; color:var(--dim);
    font-family:inherit;
  }
  .ability .cdover{
    position:absolute; left:0; bottom:0; width:100%; height:0%;
    background:rgba(0,0,0,.55); pointer-events:none;
  }
  .ability.armed{border-color:#e08770; animation:pulse 1s infinite}
  .ability.armed .lbl{color:#e8987f}
  .ability.armed.gasArmed{border-color:var(--gas)}
  .ability.armed.gasArmed .lbl{color:var(--gas)}
  @keyframes pulse{50%{filter:brightness(1.3)}}
  #clock{font-size:13px; color:var(--dim); letter-spacing:1px}
  .icon-btn{
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    background:transparent; border:1px solid #3a3226; color:var(--dim);
    cursor:pointer; font-family:inherit;
  }
  .icon-btn:hover{color:var(--chalk); border-color:#5c5240}
  button:focus-visible{outline:1px solid var(--chalk); outline-offset:1px}

  /* ---------- map ---------- */
  #cvwrap{position:relative}
  canvas{display:block; width:100%; border:1px solid var(--line); border-top:none; border-bottom:none; background:#3a3226}
  #trenchIcons{
    position:absolute; display:none; z-index:6; align-items:center; gap:4px;
    padding:4px; background:linear-gradient(#221d14ee,#191510ee);
    border:1px solid #5c5240; box-shadow:0 4px 14px rgba(0,0,0,.6);
  }
  #trenchIcons .tcount{font-size:10px; color:var(--dim); padding:0 5px; letter-spacing:1px; white-space:nowrap}
  .t-icon{
    width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(#463d2d,#38301f); color:var(--chalk);
    border:1px solid #5c5240; cursor:pointer; font-family:inherit;
  }
  .t-icon:hover:not(:disabled){background:linear-gradient(#544a36,#443a26)}
  .t-icon:disabled{opacity:.35; cursor:default}
  #toasts{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:4px;
    z-index:5; pointer-events:none; width:max-content; max-width:90%;
  }
  .toast{
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    background:rgba(18,14,8,.85); color:var(--chalk);
    border:1px solid var(--line); border-left:3px solid var(--dim);
    padding:4px 12px; opacity:0; transform:translateY(-6px);
    transition:opacity .25s, transform .25s;
  }
  .toast.show{opacity:1; transform:none}
  .toast.warn{border-left-color:var(--alert); color:#e0a394}
  .toast.good{border-left-color:var(--ally); color:#c3c78e}
  .toast.bad{border-left-color:#8b95a2; color:#b3bcc7}

  /* ---------- tooltip ---------- */
  #tooltip{
    position:fixed; display:none; z-index:50; max-width:230px;
    background:#12100a; color:var(--chalk); font-size:11px; line-height:1.45;
    border:1px solid #5c5240; padding:6px 9px; pointer-events:none;
    box-shadow:0 6px 16px rgba(0,0,0,.6);
  }
  #tooltip kbd{color:var(--dim)}

  /* ---------- sector panels ---------- */
  #sectors{
    display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
    background:var(--line); border:1px solid var(--line); border-top:1px solid #0e0b07;
  }
  .sector{background:linear-gradient(#1d1913,#171310); padding:9px 12px; font-size:12px}
  .sector h2{
    font-size:10px; letter-spacing:3px; color:var(--dim); font-weight:normal;
    text-transform:uppercase; margin-bottom:6px; display:flex; justify-content:space-between;
  }
  .sector h2 .front{color:var(--chalk); letter-spacing:1px; text-transform:none}
  .men{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .men b{color:var(--ally); min-width:20px; text-align:right}
  .menbar{flex:1; height:5px; background:rgba(0,0,0,.4); border:1px solid #33
2b1e; position:relative}
  .menbar i{position:absolute; inset:0; right:auto; background:var(--ally); opacity:.75}
  .sector .btns{display:flex; gap:6px}
  .sec-btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    font-family:inherit; font-size:11px; letter-spacing:1px; text-transform:uppercase;
    background:linear-gradient(#463d2d,#38301f); color:var(--chalk);
    border:1px solid #5c5240; border-bottom-color:#2a2417;
    padding:6px 4px; cursor:pointer;
  }
  .sec-btn:hover:not(:disabled){background:linear-gradient(#544a36,#443a26)}
  .sec-btn:active:not(:disabled){transform:translateY(1px)}
  .sec-btn:disabled{opacity:.4; cursor:default}
  .sec-btn.push{border-color:#7a5c48}

  #overlay{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(16,13,8,.88); flex-direction:column; gap:16px; text-align:center; z-index:60;
  }
  #overlay h2{font-size:24px; letter-spacing:12px; text-transform:uppercase; text-shadow:0 2px 0 #000}
  #overlay p{color:var(--dim); font-size:13px; max-width:420px; line-height:1.6}
  #overlay button{
    font-family:inherit; font-size:12px; letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(#463d2d,#38301f); color:var(--chalk);
    border:1px solid #5c5240; padding:8px 18px; cursor:pointer;
  }
  #hint{font-size:11px; color:var(--dim); margin-top:9px; text-align:center; letter-spacing:1px}
</style>
</head>
<body>
<h1>Trench Assault — 1943</h1>
<div id="wrap">
  <div id="hud">
    <div class="hud-group">
      <div class="res" data-tip="Reserve manpower. Grows by 1 every 1.1s (max 200). Deploying spends 10.">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="currentColor" style="color:#8f8877">
          <circle cx="7" cy="3.5" r="3"/><path d="M1 16v-4c0-3 2.5-5 6-5s6 2 6 5v4z"/>
        </svg>
        <b id="reserves">0</b>
        <span class="sub">MEN IN<br>RESERVE</span>
      </div>
    </div>
    <div class="hud-group">
      <button class="ability" id="artyBtn"
        data-tip="<b>Artillery barrage</b> — arm, then click the map. Four shells, wide scatter, deadly to infantry on both sides. 18s reload. <kbd>[1]</kbd>">
        <span class="ic"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <circle cx="8" cy="8" r="4.5"/><path d="M8 0.5v3M8 12.5v3M0.5 8h3M12.5 8h3"/>
        </svg></span>
        <span class="lbl">Artillery</span>
        <span class="cdover"></span><kbd>1</kbd>
      </button>
      <button class="ability" id="gasBtn"
        data-tip="<b>Gas shells</b> — arm, then click the map. A drifting cloud that kills anything inside it for ~12s, <b>including your own men</b>. 30s reload. <kbd>[2]</kbd>">
        <span class="ic"><svg width="18" height="14" viewBox="0 0 18 14" fill="currentColor">
          <circle cx="5" cy="9" r="4"/><circle cx="10" cy="6" r="4.6"/><circle cx="14" cy="9.5" r="3.4"/>
        </svg></span>
        <span class="lbl">Gas</span>
        <span class="cdover"></span><kbd>2</kbd>
      </button>
      <button class="ability" id="tankBtn"
        data-tip="<b>Deploy tank</b> — arm, then click a sector. It grinds forward, shells the trench ahead and soaks up rifle fire, but enemy AT guns will knock it out. One at a time, 60s to replace. <kbd>[3]</kbd>">
        <span class="ic"><svg width="20" height="14" viewBox="0 0 20 14" fill="currentColor">
          <rect x="2" y="7" width="16" height="5" rx="2.5"/><rect x="6" y="3.5" width="6" height="4" rx="1"/><rect x="11.5" y="4.5" width="7" height="1.6"/>
        </svg></span>
        <span class="lbl">Tank</span>
        <span class="cdover"></span><kbd>3</kbd>
      </button>
    </div>
    <div class="hud-group">
      <span id="clock">00:00</span>
      <button id="muteBtn" class="icon-btn" data-tip="Toggle sound">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M1 5h3l4-3.5v11L4 9H1z"/><path d="M10 4.5c1.4 1.4 1.4 3.6 0 5" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
      </button>
    </div>
  </div>

  <div id="cvwrap">
    <canvas id="cv" width="960" height="560"></canvas>
    <div id="toasts"></div>
    <div id="trenchIcons">
      <span class="tcount" id="tiCount"></span>
      <button class="t-icon" id="tiDeploy"
        data-tip="<b>Deploy here</b> — send 10 men from reserve straight to this trench. They march up from the rear and can be shot on the way.">
        <svg width="13" height="13" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M6.5 1v11M1 6.5h11"/></svg>
      </button>
      <button class="t-icon" id="tiAction" data-tip="">
        <svg id="tiActionSvg" width="13" height="13" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M2 8l4.5-5L11 8M2 12l4.5-5L11 12"/></svg>
      </button>
    </div>
  </div>

  <div id="sectors">
    <div class="sector" data-s="0">
      <h2>West <span class="front"></span></h2>
      <div class="men"><b>0</b><div class="menbar"><i></i></div></div>
      <div class="btns">
        <button class="sec-btn deploy" data-tip="Send 10 reserves to this sector's front trench.">
          <svg width="11" height="11" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M6.5 1v11M1 6.5h11"/></svg>Deploy
        </button>
        <button class="sec-btn push" data-tip="Send this sector's front garrison over the top at the line ahead.">
          <svg width="11" height="11" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M2 8l4.5-5L11 8M2 12l4.5-5L11 12"/></svg>Push
        </button>
      </div>
    </div>
    <div class="sector" data-s="1">
      <h2>Centre <span class="front"></span></h2>
      <div class="men"><b>0</b><div class="menbar"><i></i></div></div>
      <div class="btns">
        <button class="sec-btn deploy" data-tip="Send 10 reserves to this sector's front trench.">
          <svg width="11" height="11" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M6.5 1v11M1 6.5h11"/></svg>Deploy
        </button>
        <button class="sec-btn push" data-tip="Send this sector's front garrison over the top at the line ahead.">
          <svg width="11" height="11" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M2 8l4.5-5L11 8M2 12l4.5-5L11 12"/></svg>Push
        </button>
      </div>
    </div>
    <div class="sector" data-s="2">
      <h2>East <span class="front"></span></h2>
      <div class="men"><b>0</b><div class="menbar"><i></i></div></div>
      <div class="btns">
        <button class="sec-btn deploy" data-tip="Send 10 reserves to this sector's front trench.">
          <svg width="11" height="11" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M6.5 1v11M1 6.5h11"/></svg>Deploy
        </button>
        <button class="sec-btn push" data-tip="Send this sector's front garrison over the top at the line ahead.">
          <svg width="11" height="11" viewBox="0 0 13 13" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M2 8l4.5-5L11 8M2 12l4.5-5L11 12"/></svg>Push
        </button>
      </div>
    </div>
  </div>
  <div id="hint">Hover any trench you hold for orders · Both sides are racing for the Central Line — don't lose it · <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> arm weapons, <kbd>Esc</kbd> cancels</div>
</div>
<div id="tooltip"></div>
<div id="overlay"><h2 id="ovTitle"></h2><p id="ovText"></p><button id="restart">New Offensive</button></div>

<script>
"use strict";
// ---------- constants ----------
const W = 960, H = 560, SECTORS = 3, SEC_W = W / SECTORS, LINES = 5;
const LINE_Y = [70, 165, 260, 355, 450];       // 0 = enemy home ... 2 = central ... 4 = player home
const LINE_NAME = ["Enemy Home Line", "Enemy Second Line", "Central Line", "Forward Trench", "Home Trench"];
const WIRE_Y = [117, 212, 307, 402];
const SEC_NAME = ["West", "Centre", "East"];
const P = "P", E = "E", N = "N";
const RANGE = 100;                             // rifle range cap (vertical px)
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const TAU = Math.PI * 2;

// ---------- audio ----------
let AC = null, muted = false, lastShotSnd = 0;
function audio() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function noise(dur, vol, freq) {
  if (muted) return;
  const ac = audio(), n = ac.createBufferSource(), g = ac.createGain(), f = ac.createBiquadFilter();
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  n.buffer = buf; f.type = "lowpass"; f.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  n.connect(f); f.connect(g); g.connect(ac.destination); n.start();
}
function sndShot() { const t = performance.now(); if (t - lastShotSnd > 90) { lastShotSnd = t; noise(0.08, 0.12, 2200); } }
function sndBoom() { noise(0.9, 0.5, 420); }
function sndHiss() { noise(1.4, 0.18, 5000); }

// ---------- state ----------
let segOwner, soldiers, tracers, booms, corpses, markers, craters, clouds, wrecks;
let particles, flashes, tracks, haze;
let reserves, reserveT, gameT, over, shake;
let armed, artyCd, gasCd, tankCd, tank;
let aiReinfT, aiCounterT, aiArtyT, aiPushT, aiGasT;
let hoverSeg;                                  // {line, sec} under the mouse, or null
const rnd = (a, b) => a + Math.random() * (b - a);
const secX = s => s * SEC_W;

function reset() {
  segOwner = LINE_Y.map((_, l) => Array(SECTORS).fill(l < 2 ? E : l === 2 ? N : P));
  soldiers = []; tracers = []; booms = []; corpses = []; markers = []; craters = [];
  clouds = []; wrecks = []; particles = []; flashes = []; tracks = [];
  haze = Array.from({ length: 4 }, () => ({ x: rnd(0, W), y: rnd(60, 460), r: rnd(120, 220), vx: rnd(3, 9) }));
  reserves = 50; reserveT = 0; gameT = 0; over = false; shake = 0;
  armed = null; artyCd = 0; gasCd = 0; tankCd = 0; tank = null; hoverSeg = null;
  aiReinfT = 5; aiCounterT = 16; aiArtyT = 30; aiPushT = 70; aiGasT = 140;
  for (let s = 0; s < SECTORS; s++) {
    for (let i = 0; i < 12; i++) soldiers.push(mkGarrison(E, 0, s));
    for (let i = 0; i < 12; i++) soldiers.push(mkGarrison(E, 1, s));
    for (let i = 0; i < 10; i++) soldiers.push(mkGarrison(P, 3, s));
    for (let i = 0; i < 12; i++) soldiers.push(mkGarrison(P, 4, s));
  }
  // the enemy races for the central line from the first second
  for (let s = 0; s < SECTORS; s++) {
    const g = garrison(E, 1, s);
    for (let i = 0; i < 7; i++) {
      const u = g[i];
      u.state = "advance"; u.tLine = 2; u.line = -1;
      u.ax = secX(s) + rnd(18, SEC_W - 18); u.ay = LINE_Y[2]; u.spd = rnd(26, 36);
    }
  }
  for (let i = 0; i < 26; i++) craters.push({ x: rnd(20, W - 20), y: rnd(90, 440), r: rnd(6, 15) });
  paintGround();
  document.getElementById("overlay").style.display = "none";
  document.getElementById("toasts").innerHTML = "";
  hideTrenchIcons();
  toast("Race for the Central Line — get there first", "warn");
}

function anchor(l, s) { return { ax: secX(s) + rnd(18, SEC_W - 18), ay: LINE_Y[l] + rnd(-5, 5) }; }
function mkGarrison(side, l, s) {
  const a = anchor(l, s);
  return { side, sec: s, line: l, x: a.ax, y: a.ay, ax: a.ax, ay: a.ay,
           state: "garrison", fireCd: rnd(0.3, 1.5), meleeCd: 0, tLine: l, ph: rnd(0, TAU) };
}
function mkAdvancer(side, s, tLine, x, y) {
  return { side, sec: s, line: -1, x, y, ax: secX(s) + rnd(18, SEC_W - 18), ay: LINE_Y[tLine],
           state: "advance", fireCd: rnd(0.5, 2), meleeCd: 0, tLine, spd: rnd(24, 34), ph: rnd(0, TAU) };
}

function pFront(s) { for (let l = 0; l < LINES; l++) if (segOwner[l][s] === P) return l; return -1; }
function eFront(s) { for (let l = LINES - 1; l >= 0; l--) if (segOwner[l][s] === E) return l; return -1; }
const garrison = (side, l, s) =>
  soldiers.filter(u => u.state === "garrison" && u.side === side && u.line === l && u.sec === s);
const meleeAt = (side, l, s) =>
  soldiers.filter(u => u.state === "melee" && u.side === side && u.tLine === l && u.sec === s);

// ---------- toasts ----------
function toast(text, kind) {
  const box = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast" + (kind ? " " + kind : "");
  el.textContent = text;
  box.appendChild(el);
  requestAnimationFrame(() => el.classList.add("show"));
  while (box.children.length > 4) box.firstChild.remove();
  setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 300); }, 3200);
}
function toastCapture(side, l, s) {
  const where = LINE_NAME[l] + " (" + SEC_NAME[s] + ")";
  if (side === P) toast(where + " secured", "good");
  else toast(where + " lost", "bad");
}

// ---------- particles ----------
function spawnDirt(x, y, n) {
  for (let i = 0; i < n; i++) particles.push({
    x, y, vx: rnd(-70, 70), vy: rnd(-130, -30), g: 260,
    t: rnd(0.4, 0.9), tot: 0.9, size: rnd(1.5, 3),
    color: Math.random() < 0.5 ? "#3b2f1e" : "#57482e", kind: "dirt"
  });
}
function spawnSmoke(x, y, n, dark) {
  for (let i = 0; i < n; i++) particles.push({
    x: x + rnd(-6, 6), y: y + rnd(-6, 6), vx: rnd(-9, 9), vy: rnd(-26, -12), g: -6,
    t: rnd(1.4, 2.6), tot: 2.6, size: rnd(4, 8),
    color: dark ? "#2a2622" : "#6e6a62", kind: "smoke"
  });
}
function particleTick(dt) {
  for (const p of particles) {
    p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.kind === "smoke") p.size += 5 * dt;
  }
}

// ---------- player actions ----------
function deploy(s) { const f = pFront(s); if (f >= 0) deployTo(f, s); }
function push(s) { const f = pFront(s); if (f >= 0) sendForward(f, s); }
function deployTo(l, s) {
  if (over || segOwner[l][s] !== P) return;
  const n = Math.min(10, reserves);
  if (n <= 0) return;
  reserves -= n;
  for (let i = 0; i < n; i++)
    soldiers.push(mkAdvancer(P, s, l, secX(s) + rnd(18, SEC_W - 18), H - rnd(6, 18)));
}
function sendForward(l, s) {                   // over the top (E/N ahead) or advance (P ahead)
  if (over || l <= 0 || segOwner[l][s] !== P) return;
  const men = garrison(P, l, s); if (!men.length) return;
  for (const u of men) {
    u.state = "advance"; u.tLine = l - 1; u.line = -1;
    u.ax = secX(s) + rnd(18, SEC_W - 18); u.ay = LINE_Y[l - 1]; u.spd = rnd(24, 34);
  }
  if (segOwner[l - 1][s] !== P) noise(0.25, 0.15, 900);
}
function fireArtillery(x, y, shells, kill) {
  let t = 0;
  for (let i = 0; i < shells; i++) {
    t += rnd(0.15, 0.45);
    setTimeout(() => shell(x + rnd(-45, 45), y + rnd(-35, 35), kill), t * 1000);
  }
}
function shell(x, y, kill) {
  if (over) return;
  booms.push({ x, y, r: 4, maxR: 58, t: 0.6, tot: 0.6 });
  craters.push({ x, y, r: rnd(9, 15) }); paintGround();
  spawnDirt(x, y, 16); spawnSmoke(x, y, 6);
  shake = Math.min(9, shake + 5);
  sndBoom();
  for (const u of soldiers)
    if (Math.hypot(u.x - x, u.y - y) < 58 && Math.random() < kill) u.dead = true;

}
function gasStrike(x, y) {

  clouds.push({ x, y, t: 12, tot: 12, drift: rnd(-6, 6), seed: rnd(0, 100), r: 20 });

}
function deployTank(s) {
  tank = { x: secX(s) + SEC_W / 2, y: H - 24, sec: s, hp: 100, maxHp: 100,
           gunCd: 1.5, mgCd: 0.5, atCd: 2.2, tread: 0, lastY: H - 24, puffT: 0 };

// ---------- tank ----------
function tankTick(dt) {
  if (!tank) return;
  const t = tank, ef = eFront(t.sec);
  const targetY = ef >= 0 ? LINE_Y[ef] + 60 : 40;
  let moving = false;
  if (t.y > targetY + 3) { t.y -= 13 * dt; moving = true; }
  else if (t.y < targetY - 3) { t.y += 13 * dt; moving = true; }
  if (moving) {
    t.tread += 30 * dt;
    if (Math.abs(t.y - t.lastY) > 4) { tracks.push({ x: t.x, y: t.y }); if (tracks.length > 400) tracks.shift(); t.lastY = t.y; }
    t.puffT -= dt;
    if (t.puffT <= 0) { t.puffT = 0.35; spawnSmoke(t.x + 12, t.y + 12, 1, true); }
  }
  t.gunCd -= dt;
  if (t.gunCd <= 0 && ef >= 0 && Math.abs(LINE_Y[ef] - t.y) < 160) {
    t.gunCd = rnd(2.6, 3.4);
    const tx = secX(t.sec) + rnd(30, SEC_W - 30), ty = LINE_Y[ef] + rnd(-8, 8);
    tracers.push({ x1: t.x, y1: t.y - 16, x2: tx, y2: ty, t: 0.12 });
    flashes.push({ x: t.x, y: t.y - 18, t: 0.07, big: true });
    booms.push({ x: tx, y: ty, r: 3, maxR: 30, t: 0.5, tot: 0.5 });
    spawnDirt(tx, ty, 8); spawnSmoke(tx, ty, 3);
    shake = Math.min(9, shake + 2);
    sndBoom();
    for (const u of soldiers)
      if (Math.hypot(u.x - tx, u.y - ty) < 30 && Math.random() < 0.5) u.dead = true;
  }
  t.mgCd -= dt;
  if (t.mgCd <= 0) {
    t.mgCd = rnd(0.6, 1);
    let tgt = null, bd = 120;
    for (const u of soldiers) {
      if (u.side !== E || u.sec !== t.sec) continue;
      const d = Math.hypot(u.x - t.x, u.y - t.y);
      if (d < bd) { bd = d; tgt = u; }
    }
    if (tgt) { tracers.push({ x1: t.x, y1: t.y - 8, x2: tgt.x, y2: tgt.y, t: 0.08 });
               flashes.push({ x: t.x, y: t.y - 8, t: 0.05 });
               sndShot(); if (Math.random() < 0.5) tgt.dead = true; }
  }
  t.atCd -= dt;
  if (t.atCd <= 0) {
    t.atCd = rnd(2, 2.6);
    let src = null;
    for (let l = 0; l < LINES; l++) {
      if (segOwner[l][t.sec] !== E || !garrison(E, l, t.sec).length) continue;
      if (Math.abs(LINE_Y[l] - t.y) < 160) { src = l; break; }
    }
    if (src !== null) {
      const sx = secX(t.sec) + rnd(40, SEC_W - 40), sy = LINE_Y[src];
      tracers.push({ x1: sx, y1: sy, x2: t.x + rnd(-14, 14), y2: t.y + rnd(-10, 10), t: 0.12 });
      flashes.push({ x: sx, y: sy, t: 0.07, big: true });
      noise(0.3, 0.25, 600);
      if (Math.random() < 0.45) {
        tank.hp -= rnd(10, 16);
        booms.push({ x: t.x + rnd(-8, 8), y: t.y + rnd(-6, 6), r: 2, maxR: 18, t: 0.35, tot: 0.35 });
        spawnSmoke(t.x, t.y, 2, true);
        shake = Math.min(9, shake + 2);
      } else {
        const mx = t.x + rnd(-30, 30), my = t.y + rnd(20, 34);
        booms.push({ x: mx, y: my, r: 2, maxR: 16, t: 0.35, tot: 0.35 });
        spawnDirt(mx, my, 6);
      }
    }
  }
  if (t.hp <= 0) {
    booms.push({ x: t.x, y: t.y, r: 6, maxR: 70, t: 0.8, tot: 0.8 });
    spawnDirt(t.x, t.y, 20); spawnSmoke(t.x, t.y, 10, true);
    wrecks.push({ x: t.x, y: t.y });
    shake = Math.min(11, shake + 8);
    sndBoom();
    toast("Tank knocked out", "bad");
    tank = null;
  }
}

// ---------- gas ----------
function gasTick(dt) {
  for (const c of clouds) {
    c.x += c.drift * dt;
    const k = 1 - c.t / c.tot;
    c.r = k < 0.25 ? 20 + k * 220 : (c.t < 3 ? 75 * (c.t / 3) : 75);
    for (const u of soldiers)
      if (Math.hypot(u.x - c.x, u.y - c.y) < c.r && Math.random() < 0.3 * dt) { u.dead = true; u.gassed = true; }
  }
}

// ---------- enemy AI ----------
function aiTick(dt) {
  const dif = Math.min(2.2, 1 + gameT / 240);
  aiReinfT -= dt; aiCounterT -= dt; aiArtyT -= dt; aiPushT -= dt; aiGasT -= dt;
  if (aiReinfT <= 0) {
    aiReinfT = rnd(4.5, 7) / dif;
    let best = null, low = 1e9;
    for (let s = 0; s < SECTORS; s++) {
      const f = eFront(s); if (f < 0) continue;
      const n = garrison(E, f, s).length;
      if (n < low) { low = n; best = { s, f }; }
    }
    if (best) {
      const n = 2 + Math.round(2 * dif);
      for (let i = 0; i < n; i++)
        soldiers.push(mkAdvancer(E, best.s, best.f, secX(best.s) + rnd(18, SEC_W - 18), rnd(4, 16)));
    }
  }
  if (aiCounterT <= 0) {                       // opportunistic local attacks (into P or unclaimed ground)
    aiCounterT = rnd(16, 26) / dif;
    let launched = 0;
    for (let s = 0; s < SECTORS && launched < 2; s++) {
      const f = eFront(s);
      if (f < 0 || f >= LINES - 1 || segOwner[f + 1][s] === E) continue;
      const g = garrison(E, f, s);
      const d = segOwner[f + 1][s] === P ? garrison(P, f + 1, s).length : 0;
      if (g.length >= (d ? 6 : 4) && d < g.length * 0.9) {
        const n = Math.floor(g.length * 0.7);
        for (let i = 0; i < n; i++) {
          const u = g[i];
          u.state = "advance"; u.tLine = f + 1; u.line = -1;
          u.ax = secX(s) + rnd(18, SEC_W - 18); u.ay = LINE_Y[f + 1]; u.spd = rnd(24, 34);
        }
        launched++;
      }
    }
  }
  if (aiPushT <= 0) {                          // coordinated offensive on every contested sector
    aiPushT = rnd(55, 80) / Math.max(1, dif * 0.8);
    let any = false;
    for (let s = 0; s < SECTORS; s++) {
      const f = eFront(s);
      if (f < 0 || f >= LINES - 1 || segOwner[f + 1][s] === E) continue;
      any = true;
      markers.push({ x: secX(s) + SEC_W / 2, y: LINE_Y[f + 1], t: 1.4 });
      const fresh = 4 + Math.round(3 * dif);
      for (let i = 0; i < fresh; i++) {
        const u = mkAdvancer(E, s, f + 1, secX(s) + rnd(18, SEC_W - 18), LINE_Y[f] + rnd(-6, 6));
        u.spd = rnd(26, 36); soldiers.push(u);
      }
      const g = garrison(E, f, s), n = Math.floor(g.length * 0.5);
      for (let i = 0; i < n; i++) {
        const u = g[i];
        u.state = "advance"; u.tLine = f + 1; u.line = -1;
        u.ax = secX(s) + rnd(18, SEC_W - 18); u.ay = LINE_Y[f + 1]; u.spd = rnd(24, 34);
      }
    }
    if (any) { noise(0.5, 0.22, 500); toast("Enemy offensive inbound", "warn"); }
  }
  if (aiArtyT <= 0) {
    aiArtyT = rnd(22, 34);
    let best = null, hi = 0;
    for (let l = 0; l < LINES; l++) for (let s = 0; s < SECTORS; s++) {
      if (segOwner[l][s] !== P) continue;
      const n = garrison(P, l, s).length;
      if (n > hi) { hi = n; best = { l, s }; }
    }
    if (best) {
      const x = secX(best.s) + SEC_W / 2 + rnd(-60, 60), y = LINE_Y[best.l];
      markers.push({ x, y, t: 1.8 });
      toast("Incoming barrage — scatter", "warn");
      setTimeout(() => fireArtillery(x, y, 4, 0.6), 1800);
    }
  }
  if (aiGasT <= 0) {                           // enemy gas on your most crowded trench (telegraphed)
    aiGasT = rnd(70, 100);
    let best = null, hi = 5;
    for (let l = 0; l < LINES; l++) for (let s = 0; s < SECTORS; s++) {
      if (segOwner[l][s] !== P) continue;
      const n = garrison(P, l, s).length;
      if (n > hi) { hi = n; best = { l, s }; }
    }
    if (best) {
      const x = secX(best.s) + SEC_W / 2 + rnd(-50, 50), y = LINE_Y[best.l];
      markers.push({ x, y, t: 2 });
      toast("Gas shells inbound", "warn");
      setTimeout(() => gasStrike(x, y), 2000);
    }
  }
}

// ---------- combat ----------
// A garrison can only engage as far as the ADJACENT trench line, never past it.
function fireLimit(u) {
  const nl = u.line + (u.side === P ? -1 : 1);
  const gap = (nl >= 0 && nl < LINES) ? Math.abs(LINE_Y[nl] - LINE_Y[u.line]) + 8 : RANGE;
  return Math.min(RANGE + 8, gap);
}
function combat(dt) {
  for (const u of soldiers) {
    if (u.dead || u.state === "melee") continue;
    u.fireCd -= dt;
    if (u.fireCd > 0) continue;
    const foeSide = u.side === P ? E : P;
    if (u.side === E && u.state === "garrison" && tank && tank.sec === u.sec &&
        tank.y > u.y - 10 && tank.y - u.y < fireLimit(u) + 30 && Math.random() < 0.35) {
      u.fireCd = rnd(0.7, 1.4);
      tracers.push({ x1: u.x, y1: u.y, x2: tank.x + rnd(-10, 10), y2: tank.y + rnd(-8, 8), t: 0.1 });
      flashes.push({ x: u.x, y: u.y, t: 0.05 });
      sndShot(); tank.hp -= 0.35;
      continue;
    }
    let tgt = null, bd = 1e9;
    if (u.state === "garrison") {
      const dir = u.side === P ? -1 : 1;
      const eff = fireLimit(u);
      for (const v of soldiers) {
        if (v.dead || v.side !== foeSide || v.sec !== u.sec) continue;
        const dy = (v.y - u.y) * dir;
        if (dy < -10 || dy > eff) continue;    // can't shoot past the next trench
        const d = Math.hypot(v.x - u.x, v.y - u.y);
        if (d < bd) { bd = d; tgt = v; }
      }
      u.fireCd = rnd(0.7, 1.4);
      if (tgt) shoot(u, tgt, 0.42 * (1 - bd / (eff + 60)));
    } else {
      for (const v of soldiers) {
        if (v.dead || v.side !== foeSide || v.sec !== u.sec || v.state !== "garrison" || v.line !== u.tLine) continue;
        const d = Math.hypot(v.x - u.x, v.y - u.y);
        if (d < bd && d < RANGE) { bd = d; tgt = v; }
      }
      u.fireCd = rnd(1.6, 2.6);
      if (tgt) shoot(u, tgt, 0.12);
    }
  }
  // melee + capture, per segment
  for (let l = 0; l < LINES; l++) for (let s = 0; s < SECTORS; s++) {
    const own = segOwner[l][s];
    if (own === N) {                           // unclaimed ground: whoever reaches it takes it
      const pa = meleeAt(P, l, s), ea = meleeAt(E, l, s);
      if (pa.length && ea.length) {            // both sides arrive: brawl for it
        for (const a of pa.concat(ea)) {
          a.meleeCd -= dt;
          if (a.meleeCd > 0) continue;
          a.meleeCd = rnd(0.4, 0.7);
          const pool = a.side === P ? ea : pa;
          const d = pool[Math.floor(Math.random() * pool.length)];
          if (d && !d.dead) {
            if (Math.random() < 0.5) d.dead = true; else a.dead = true;
            sndShot();
          }
        }
      } else if (pa.length || ea.length) {
        const side = pa.length ? P : E;
        segOwner[l][s] = side;
        toastCapture(side, l, s);
        for (const a of (pa.length ? pa : ea)) {
          a.state = "garrison"; a.line = l;
          const an = anchor(l, s); a.ax = an.ax; a.ay = an.ay;
        }
        noise(0.3, 0.2, 700);
      }
      continue;
    }
    const att = own === P ? E : P;
    const atk = meleeAt(att, l, s);
    if (!atk.length) continue;
    const def = garrison(own, l, s);
    if (def.length) {
      for (const a of atk) {
        a.meleeCd -= dt;
        if (a.meleeCd > 0) continue;
        a.meleeCd = rnd(0.4, 0.7);
        const d = def[Math.floor(Math.random() * def.length)];
        if (d && !d.dead) {
          if (Math.random() < 0.55) d.dead = true; else { a.dead = true; }
          sndShot();
        }
      }
    }
    if (!garrison(own, l, s).length && meleeAt(att, l, s).length) {
      segOwner[l][s] = att;
      toastCapture(att, l, s);
      for (const a of meleeAt(att, l, s)) {
        a.state = "garrison"; a.line = l;
        const an = anchor(l, s); a.ax = an.ax; a.ay = an.ay;
      }
      noise(0.3, 0.2, 700);
    }
  }
}
function shoot(u, v, p) {
  tracers.push({ x1: u.x, y1: u.y, x2: v.x, y2: v.y, t: 0.1 });
  flashes.push({ x: u.x, y: u.y, t: 0.05 });
  sndShot();
  if (Math.random() < Math.max(0.05, p)) v.dead = true;
}

// ---------- movement ----------
function move(dt) {
  for (const u of soldiers) {
    if (u.dead) continue;
    if (u.state === "garrison") {
      const dx = u.ax - u.x, dy = u.ay - u.y, d = Math.hypot(dx, dy);
      if (d > 2) { u.x += dx / d * 40 * dt; u.y += dy / d * 40 * dt; u.walking = true; }
      else u.walking = false;
      continue;
    }
    if (u.state === "advance") {
      u.walking = true;
      const dx = u.ax - u.x, dy = u.ay - u.y, d = Math.hypot(dx, dy);
      if (d < 6) {
        if (segOwner[u.tLine][u.sec] === u.side) { u.state = "garrison"; u.line = u.tLine; }
        else { u.state = "melee"; u.meleeCd = rnd(0.1, 0.4); }
      } else {
        u.x += dx / d * u.spd * dt; u.y += dy / d * u.spd * dt;
      }
    }
  }
  for (let i = soldiers.length - 1; i >= 0; i--) {
    if (soldiers[i].dead) {
      const u = soldiers[i];
      corpses.push({ x: u.x, y: u.y, t: 8, gassed: u.gassed, a: rnd(0, TAU) });
      soldiers.splice(i, 1);
    }
  }
}

// ---------- win / lose ----------
function checkEnd() {
  if (segOwner.every(row => row.every(o => o === P))) return end(true);
  if (segOwner[LINES - 1].every(o => o === E)) return end(false);
}
function end(won) {
  over = true;
  hideTrenchIcons();
  const ov = document.getElementById("overlay");
  document.getElementById("ovTitle").textContent = won ? "Objective Taken" : "Line Overrun";
  document.getElementById("ovText").textContent = won
    ? "Every trench line is in your hands. The salient is yours — until the counteroffensive."
    : "The enemy has taken your home trench and cut the supply line. The sector is lost.";
  ov.style.display = "flex";
}

// ---------- static layers ----------
const ground = document.createElement("canvas");
ground.width = W; ground.height = H;
const vignette = document.createElement("canvas");
vignette.width = W; vignette.height = H;
{
  const g = vignette.getContext("2d");
  const rg = g.createRadialGradient(W / 2, H / 2, H * 0.45, W / 2, H / 2, H * 0.95);
  rg.addColorStop(0, "rgba(0,0,0,0)");
  rg.addColorStop(1, "rgba(10,7,3,0.55)");
  g.fillStyle = rg; g.fillRect(0, 0, W, H);
}
const grain = document.createElement("canvas");
grain.width = 160; grain.height = 94;
{
  const g = grain.getContext("2d");
  const im = g.createImageData(160, 94);
  for (let i = 0; i < im.data.length; i += 4) {
    const v = 100 + Math.random() * 110;

  }

function paintGround() {
  const g = ground.getContext("2d");
  const grad = g.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#3d3421"); grad.addColorStop(0.5, "#463b28"); grad.addColorStop(1, "#3a3122");
  g.fillStyle = grad; g.fillRect(0, 0, W, H);
  let seed = 7;
  const r = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
  for (let i = 0; i < 260; i++) {
    g.fillStyle = "rgba(" + (r() < 0.5 ? "30,24,14" : "80,68,44") + "," + (0.05 + r() * 0.08) + ")";
    g.beginPath(); g.arc(r() * W, r() * H, 6 + r() * 26, 0, TAU); g.fill();
  }
  g.fillStyle = "rgba(0,0,0,.09)";
  for (let i = 0; i < 900; i++) g.fillRect(r() * W, r() * H, 2, 2);
  for (const y of WIRE_Y) {
    for (let i = 0; i < 50; i++) {
      g.fillStyle = "rgba(22,17,10," + (0.06 + r() * 0.1) + ")";
      g.beginPath(); g.arc(r() * W, y + (r() - 0.5) * 55, 4 + r() * 12, 0, TAU); g.fill();
    }
  }
  for (const c of craters) {
    g.beginPath(); g.arc(c.x, c.y, c.r, 0, TAU);
    g.fillStyle = "rgba(20,16,9,.55)"; g.fill();
    g.beginPath(); g.arc(c.x - c.r * .2, c.y - c.r * .2, c.r * .6, 0, TAU);
    g.fillStyle = "rgba(15,12,7,.6)"; g.fill();
    g.strokeStyle = "rgba(96,82,54,.35)"; g.lineWidth = 1.5;
    g.beginPath(); g.arc(c.x, c.y, c.r + 1, TAU * 0.55, TAU * 0.95); g.stroke();
  }
  g.strokeStyle = "rgba(0,0,0,.4)"; g.lineWidth = 1;
  for (const y of WIRE_Y) {
    g.beginPath();
    for (let x = 8; x < W; x += 14) { g.moveTo(x - 4, y - 3); g.lineTo(x + 4, y + 3); g.moveTo(x + 4, y - 3); g.lineTo(x - 4, y + 3); }
    g.stroke();
    g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke();
    g.fillStyle = "rgba(30,24,14,.8)";
    for (let x = 8; x < W; x += 42) g.fillRect(x - 1, y - 5, 2, 10);
  }
  for (let l = 0; l < LINES; l++) {
    const y = LINE_Y[l];
    g.fillStyle = "rgba(16,12,7,.85)";
    g.fillRect(0, y - 8, W, 16);
    g.lineWidth = 4; g.strokeStyle = "#0f0b06";
    zig(g, y); g.stroke();
    g.lineWidth = 1.5; g.strokeStyle = "rgba(120,102,66,.5)";
    zig(g, y - 8); g.stroke();
    g.strokeStyle = "rgba(0,0,0,.6)";
    zig(g, y + 8); g.stroke();
    g.fillStyle = "rgba(74,60,36,.5)";
    for (let x = 6; x < W; x += 26) g.fillRect(x, y - 2, 14, 4);
    for (let x = 4; x < W; x += 9) {
      g.fillStyle = "rgba(" + (x % 18 ? "108,94,62" : "94,80,52") + ",.75)";
      g.beginPath(); g.ellipse(x, y - 11, 4, 2.4, 0, 0, TAU); g.fill();
      g.beginPath(); g.ellipse(x + 4, y + 11, 4, 2.4, 0, 0, TAU); g.fill();
    }
  }
}
function zig(g, y) {
  g.beginPath(); g.moveTo(0, y);
  for (let x = 0; x <= W; x += 40) g.lineTo(x, y + (x / 40 % 2 ? 5 : -5));
}

// ---------- render ----------
function ownColor(o, a) {
  return o === P ? "rgba(168,174,92," + a + ")" : o === E ? "rgba(139,149,162," + a + ")" : "rgba(184,173,143," + a + ")";
}
function drawSoldier(u) {
  const bob = u.walking ? Math.sin(gameT * 11 + u.ph) : 0;
  const y = u.y + bob * 0.6;
  ctx.fillStyle = "rgba(0,0,0,.3)";
  ctx.beginPath(); ctx.ellipse(u.x, u.y + 3, 3, 1.4, 0, 0, TAU); ctx.fill();
  if (u.walking) {
    ctx.fillStyle = "#1e1a12";
    ctx.fillRect(u.x - 2 + (bob > 0 ? 1 : 0), y + 2, 1.6, 1.6);
    ctx.fillRect(u.x + 1 - (bob > 0 ? 0 : 1), y + 2, 1.6, 1.6);
  }
  ctx.fillStyle = u.side === P ? "#aab060" : "#a4adb8";
  ctx.fillRect(u.x - 2, y - 3, 4, 5.5);
  ctx.fillStyle = u.side === P ? "#7c8244" : "#7b848f";
  ctx.beginPath(); ctx.arc(u.x, y - 3, 2, 0, TAU); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.18)";
  ctx.fillRect(u.x - 2, y - 1, 4, 0.8);
}
function drawTank(t) {
  ctx.save(); ctx.translate(t.x, t.y);
  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.beginPath(); ctx.ellipse(2, 4, 17, 13, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#262217"; ctx.fillRect(-15, -13, 5, 26); ctx.fillRect(10, -13, 5, 26);
  ctx.strokeStyle = "#3d3626"; ctx.lineWidth = 1;
  const off = t.tread % 5;
  for (let yy = -13 + off; yy < 13; yy += 5) {
    ctx.beginPath(); ctx.moveTo(-15, yy); ctx.lineTo(-10, yy);
    ctx.moveTo(10, yy); ctx.lineTo(15, yy); ctx.stroke();
  }
  ctx.fillStyle = "#6f7248"; ctx.fillRect(-11, -11, 22, 22);
  ctx.fillStyle = "#5c603b"; ctx.fillRect(-11, -11, 22, 5);
  ctx.fillStyle = "rgba(0,0,0,.25)"; ctx.fillRect(-11, 7, 22, 4);
  ctx.fillStyle = "#7d8054"; ctx.beginPath(); ctx.arc(0, -1, 7.5, 0, TAU); ctx.fill();
  ctx.strokeStyle = "#4d5030"; ctx.stroke();
  ctx.strokeStyle = "#565a36"; ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(0, -4); ctx.lineTo(0, -20); ctx.stroke();
  ctx.strokeStyle = "#3e402a"; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, -20); ctx.stroke();
  ctx.fillStyle = "rgba(0,0,0,.5)"; ctx.fillRect(-14, 17, 28, 3);
  ctx.fillStyle = t.hp > 35 ? "#a8ae5c" : "#c25b45";
  ctx.fillRect(-14, 17, 28 * Math.max(0, t.hp) / t.maxHp, 3);
  ctx.restore();
}
function render() {
  ctx.save();
  if (shake > 0.2) ctx.translate(rnd(-shake, shake) * 0.5, rnd(-shake, shake) * 0.5);
  ctx.drawImage(ground, 0, 0);
  ctx.fillStyle = "rgba(24,19,11,.5)";
  for (const tr of tracks) { ctx.fillRect(tr.x - 14, tr.y - 1, 4, 3); ctx.fillRect(tr.x + 10, tr.y - 1, 4, 3); }
  ctx.strokeStyle = "rgba(216,210,192,.07)"; ctx.setLineDash([4, 8]); ctx.lineWidth = 1;
  for (let s = 1; s < SECTORS; s++) { ctx.beginPath(); ctx.moveTo(secX(s), 0); ctx.lineTo(secX(s), H); ctx.stroke(); }
  ctx.setLineDash([]);
  // ownership strips + hover highlight
  for (let l = 0; l < LINES; l++) for (let s = 0; s < SECTORS; s++) {
    ctx.fillStyle = ownColor(segOwner[l][s], 0.4);
    ctx.fillRect(secX(s) + 4, LINE_Y[l] + 12, SEC_W - 8, 2);
  }
  if (hoverSeg && segOwner[hoverSeg.line][hoverSeg.sec] === P) {
    ctx.fillStyle = "rgba(216,210,192,.06)";
    ctx.fillRect(secX(hoverSeg.sec) + 2, LINE_Y[hoverSeg.line] - 14, SEC_W - 4, 28);
    ctx.strokeStyle = "rgba(216,210,192,.22)"; ctx.lineWidth = 1;
    ctx.strokeRect(secX(hoverSeg.sec) + 2, LINE_Y[hoverSeg.line] - 14, SEC_W - 4, 28);
  }
  // pennants
  for (let l = 0; l < LINES; l++) for (let s = 0; s < SECTORS; s++) {
    const x = secX(s) + SEC_W / 2, y = LINE_Y[l] - 14, own = segOwner[l][s];
    const wave = Math.sin(gameT * 4 + l + s) * 1.5;
    ctx.strokeStyle = "#241f14"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - 12); ctx.stroke();
    ctx.fillStyle = own === P ? "#a8ae5c" : own === E ? "#8b95a2" : "#b8ad8f";
    ctx.beginPath(); ctx.moveTo(x, y - 12); ctx.lineTo(x + 11 + wave, y - 9); ctx.lineTo(x, y - 6);
    ctx.closePath(); ctx.fill();
  }
  for (const w of wrecks) {
    ctx.save(); ctx.translate(w.x, w.y);
    ctx.fillStyle = "rgba(0,0,0,.35)";
    ctx.beginPath(); ctx.ellipse(2, 4, 16, 12, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#221d12"; ctx.fillRect(-15, -13, 5, 26); ctx.fillRect(10, -13, 5, 26);
    ctx.fillStyle = "#33301f"; ctx.fillRect(-11, -11, 22, 22);
    ctx.fillStyle = "#1b1810"; ctx.beginPath(); ctx.arc(2, 1, 6, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#26221a"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(9, -16); ctx.stroke();
    ctx.restore();
    if (Math.random() < 0.06) spawnSmoke(w.x + rnd(-4, 4), w.y - 6, 1, true);
  }
  for (const c of corpses) {
    ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.a);
    ctx.globalAlpha = Math.min(1, c.t / 3.5);
    ctx.fillStyle = c.gassed ? "#5a5c2e" : "#42301f";
    ctx.fillRect(-2.5, -1, 5, 2);
    ctx.fillStyle = c.gassed ? "#4a4c24" : "#372718";
    ctx.beginPath(); ctx.arc(-3, 0, 1.2, 0, TAU); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  for (const u of soldiers) drawSoldier(u);
  if (tank) drawTank(tank);
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.t / p.tot) * (p.kind === "smoke" ? 0.35 : 0.9);
    ctx.fillStyle = p.color;
    if (p.kind === "smoke") { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill(); }
    else ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  for (const t of tracers) {
    const a = Math.min(1, t.t / 0.1);
    ctx.globalAlpha = a * 0.35; ctx.strokeStyle = "#ffb64d"; ctx.lineWidth = 2.6;
    ctx.beginPath(); ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2); ctx.stroke();
    ctx.globalAlpha = a; ctx.strokeStyle = "#ffe9b0"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(t.x1, t.y1); ctx.lineTo(t.x2, t.y2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (const f of flashes) {
    ctx.globalAlpha = Math.min(1, f.t / 0.05);
    ctx.fillStyle = "#ffe9a8";
    ctx.beginPath(); ctx.arc(f.x, f.y, f.big ? 4.5 : 2, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const c of clouds) {
    const a = Math.min(0.55, c.t / c.tot * 0.75);
    for (let i = 0; i < 6; i++) {
      const ang = c.seed + i * 1.05 + Math.sin(gameT * 0.8 + i) * 0.3;
      const rr = c.r * 0.55, ox = Math.cos(ang) * rr * 0.7, oy = Math.sin(ang) * rr * 0.5;
      const br = c.r * 0.5;
      const rg = ctx.createRadialGradient(c.x + ox, c.y + oy, br * 0.15, c.x + ox, c.y + oy, br);
      rg.addColorStop(0, "rgba(178,184,72," + a * 0.5 + ")");
      rg.addColorStop(1, "rgba(140,148,52,0)");
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(c.x + ox, c.y + oy, br, 0, TAU); ctx.fill();
    }
    const rg = ctx.createRadialGradient(c.x, c.y, 4, c.x, c.y, c.r * 0.65);
    rg.addColorStop(0, "rgba(206,213,94," + a * 0.45 + ")");
    rg.addColorStop(1, "rgba(160,168,60,0)");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r * 0.65, 0, TAU); ctx.fill();
  }
  for (const m of markers) {
    ctx.strokeStyle = "rgba(214,101,75," + (0.45 + 0.4 * Math.sin(m.t * 20)) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(m.x, m.y, 26, 0, TAU); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(m.x - 32, m.y); ctx.lineTo(m.x + 32, m.y);
    ctx.moveTo(m.x, m.y - 32); ctx.lineTo(m.x, m.y + 32); ctx.stroke();
  }
  for (const b of booms) {
    const k = 1 - b.t / b.tot, a = b.t / b.tot;
    ctx.globalAlpha = a;
    ctx.fillStyle = "#fff3d0";
    ctx.beginPath(); ctx.arc(b.x, b.y, Math.max(0.5, (1 - k) * 7), 0, TAU); ctx.fill();
    ctx.fillStyle = "rgba(240,146,58," + a * 0.85 + ")";
    ctx.beginPath(); ctx.arc(b.x, b.y, 5 + k * 13, 0, TAU); ctx.fill();
    ctx.strokeStyle = "rgba(80,66,42," + a * 0.8 + ")"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r + k * b.maxR, 0, TAU); ctx.stroke();
    ctx.strokeStyle = "rgba(255,220,160," + a * 0.35 + ")"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(b.x, b.y, (b.r + k * b.maxR) * 0.8, 0, TAU); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (const hz of haze) {
    const rg = ctx.createRadialGradient(hz.x, hz.y, 10, hz.x, hz.y, hz.r);
    rg.addColorStop(0, "rgba(120,112,92,0.05)");
    rg.addColorStop(1, "rgba(120,112,92,0)");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(hz.x, hz.y, hz.r, 0, TAU); ctx.fill();
  }
  ctx.restore();
  ctx.drawImage(vignette, 0, 0);
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(grain, rnd(-3, 0), rnd(-3, 0), W + 6, H + 6);
  ctx.restore();
  ctx.imageSmoothingEnabled = true;
  if (armed) {
    ctx.fillStyle = armed === "gas" ? "rgba(198,204,88,.95)" : "rgba(214,101,75,.95)";
    ctx.font = "12px Courier New";
    ctx.fillText(armed === "arty" ? "CLICK TO CALL IN BARRAGE" :
                 armed === "gas" ? "CLICK TO DROP GAS SHELLS" :
                 "CLICK A SECTOR TO SEND THE TANK IN", 12, 20);
  }
}

// ---------- tooltip system ----------
const tipEl = document.getElementById("tooltip");
let tipTarget = null;
document.addEventListener("mouseover", e => {
  const t = e.target.closest("[data-tip]");
  if (!t || t === tipTarget || !t.dataset.tip) return;
  tipTarget = t;
  tipEl.innerHTML = t.dataset.tip;
  tipEl.style.display = "block";
  const r = t.getBoundingClientRect(), tr = tipEl.getBoundingClientRect();
  let x = r.left + r.width / 2 - tr.width / 2;
  x = Math.max(6, Math.min(window.innerWidth - tr.width - 6, x));
  let y = r.top - tr.height - 8;
  if (y < 6) y = r.bottom + 8;
  tipEl.style.left = x + "px"; tipEl.style.top = y + "px";
});
document.addEventListener("mouseout", e => {
  if (tipTarget && !tipTarget.contains(e.relatedTarget)) { tipTarget = null; tipEl.style.display = "none"; }
});
document.addEventListener("mousedown", () => { tipTarget = null; tipEl.style.display = "none"; });

// ---------- trench hover icons ----------
const tiEl = document.getElementById("trenchIcons"),
      tiCount = document.getElementById("tiCount"),
      tiDeploy = document.getElementById("tiDeploy"),
      tiAction = document.getElementById("tiAction"),
      tiActionSvg = document.getElementById("tiActionSvg");
let tiSeg = null, tiHideT = null, tiOverIcons = false;
function showTrenchIcons(l, s) {
  tiSeg = { line: l, sec: s };
  const r = cv.getBoundingClientRect(), wrap = document.getElementById("cvwrap");
  const sx = r.width / W, sy = r.height / H;
  tiEl.style.display = "flex";
  refreshTrenchIcons();
  const mw = tiEl.offsetWidth || 140;
  let px = (secX(s) + SEC_W / 2) * sx - mw / 2;
  px = Math.max(4, Math.min(wrap.clientWidth - mw - 4, px));
  let py = LINE_Y[l] * sy - 46;
  if (py < 4) py = LINE_Y[l] * sy + 18;
  tiEl.style.left = px + "px"; tiEl.style.top = py + "px";
}
function hideTrenchIcons() { tiSeg = null; tiEl.style.display = "none"; }
function refreshTrenchIcons() {
  if (!tiSeg) return;
  const l = tiSeg.line, s = tiSeg.sec;
  if (over || segOwner[l][s] !== P) return hideTrenchIcons();
  const n = garrison(P, l, s).length;
  tiCount.textContent = LINE_NAME[l] + " · " + n;
  tiDeploy.disabled = reserves <= 0;
  if (l === 0) { tiAction.style.display = "none"; return; }
  tiAction.style.display = "";
  const above = segOwner[l - 1][s];
  if (above === P) {
    tiAction.dataset.tip = "<b>Advance</b> — move this garrison forward to the friendly trench ahead.";
    tiActionSvg.innerHTML = '<path d="M6.5 12V2M2 6L6.5 1.5 11 6"/>';
  } else {
    tiAction.dataset.tip = "<b>Over the top</b> — send this garrison across no-man's land at the " +
      (above === E ? "enemy trench" : "unclaimed trench") + " ahead.";
    tiActionSvg.innerHTML = '<path d="M2 8l4.5-5L11 8M2 12l4.5-5L11 12"/>';
  }
  tiAction.disabled = n === 0;
}
function segHit(x, y) {
  for (let l = 0; l < LINES; l++) {
    if (Math.abs(y - LINE_Y[l]) < 15) {
      const s = Math.min(SECTORS - 1, Math.floor(x / SEC_W));
      if (segOwner[l][s] === P) return { line: l, sec: s };
    }
  }
  return null;
}
cv.addEventListener("mousemove", e => {
  const r = cv.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width), y = (e.clientY - r.top) * (H / r.height);
  const hit = over || armed ? null : segHit(x, y);
  hoverSeg = hit;
  cv.style.cursor = armed ? "crosshair" : hit ? "pointer" : "default";
  if (hit) {
    clearTimeout(tiHideT);
    if (!tiSeg || tiSeg.line !== hit.line || tiSeg.sec !== hit.sec) showTrenchIcons(hit.line, hit.sec);
  } else if (tiSeg && !tiOverIcons) {
    clearTimeout(tiHideT);
    tiHideT = setTimeout(() => { if (!tiOverIcons) hideTrenchIcons(); }, 300);
  }
});
cv.addEventListener("mouseleave", () => {
  hoverSeg = null;
  tiHideT = setTimeout(() => { if (!tiOverIcons) hideTrenchIcons(); }, 300);
});
tiEl.addEventListener("mouseenter", () => { tiOverIcons = true; clearTimeout(tiHideT); });
tiEl.addEventListener("mouseleave", () => { tiOverIcons = false; tiHideT = setTimeout(hideTrenchIcons, 250); });
tiDeploy.addEventListener("click", () => { if (tiSeg) { deployTo(tiSeg.line, tiSeg.sec); refreshTrenchIcons(); } });
tiAction.addEventListener("click", () => { if (tiSeg) { sendForward(tiSeg.line, tiSeg.sec); hideTrenchIcons(); } });

// ---------- HUD ----------
const secEls = [...document.querySelectorAll(".sector")];
function abilityState(btn, cd, max, isArmed, armedClass) {
  const over_ = btn.querySelector(".cdover"), lbl = btn.querySelector(".lbl");
  btn.classList.toggle("armed", isArmed);
  if (armedClass) btn.classList.toggle(armedClass, isArmed);
  if (isArmed) { lbl.textContent = "Target…"; over_.style.height = "0%"; btn.disabled = false; }
  else if (cd > 0) {
    lbl.textContent = Math.ceil(cd) + "s";
    over_.style.height = (cd / max * 100) + "%";
    btn.disabled = true;
  } else {
    lbl.textContent = btn.dataset.name;
    over_.style.height = "0%";
    btn.disabled = false;
  }
}
const artyBtn = document.getElementById("artyBtn"), gasBtn = document.getElementById("gasBtn"), tankBtn = document.getElementById("tankBtn");
artyBtn.dataset.name = "Artillery"; gasBtn.dataset.name = "Gas"; tankBtn.dataset.name = "Tank";
function hud() {
  document.getElementById("reserves").textContent = reserves;
  const m = Math.floor(gameT / 60), s = Math.floor(gameT % 60);
  document.getElementById("clock").textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  abilityState(artyBtn, artyCd, 18, armed === "arty");
  abilityState(gasBtn, gasCd, 30, armed === "gas", "gasArmed");
  if (tank) {
    tankBtn.classList.remove("armed");
    tankBtn.querySelector(".lbl").textContent = "In action";
    tankBtn.querySelector(".cdover").style.height = "0%";
    tankBtn.disabled = true;
  } else abilityState(tankBtn, tankCd, 60, armed === "tank");
  for (let s2 = 0; s2 < SECTORS; s2++) {
    const el = secEls[s2], f = pFront(s2);
    const frontEl = el.querySelector(".front"), menB = el.querySelector(".men b"), menBar = el.querySelector(".menbar i");
    const pushBtn = el.querySelector(".push"), depBtn = el.querySelector(".deploy");
    if (f < 0) {
      frontEl.textContent = "SECTOR LOST";
      menB.textContent = "0"; menBar.style.width = "0%";
      pushBtn.disabled = true; depBtn.disabled = true; continue;
    }
    const n = garrison(P, f, s2).length;
    frontEl.textContent = LINE_NAME[f];
    menB.textContent = n;
    menBar.style.width = Math.min(100, n * 5) + "%";
    depBtn.disabled = reserves <= 0;
    pushBtn.disabled = f === 0 || n === 0;
  }
  refreshTrenchIcons();
}

// ---------- loop ----------
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  if (!over) {
    gameT += dt;
    reserveT += dt;
    if (reserveT >= 1.1 && reserves < 200) { reserveT = 0; reserves++; }
    if (artyCd > 0) artyCd -= dt;
    if (gasCd > 0) gasCd -= dt;
    if (tankCd > 0) tankCd -= dt;
    aiTick(dt);
    combat(dt);
    tankTick(dt);
    gasTick(dt);
    move(dt);
    particleTick(dt);
    checkEnd();
  }
  shake = Math.max(0, shake - 22 * dt);
  for (const hz of haze) { hz.x += hz.vx * dt; if (hz.x - hz.r > W) hz.x = -hz.r; }
  for (const a of [tracers, booms, corpses, markers, clouds, flashes, particles]) {
    for (let i = a.length - 1; i >= 0; i--) { a[i].t -= dt; if (a[i].t <= 0) a.splice(i, 1); }
  }
  render(); hud();
  requestAnimationFrame(frame);
}

// ---------- input ----------
secEls.forEach(el => {
  const s = +el.dataset.s;
  el.querySelector(".deploy").addEventListener("click", () => deploy(s));
  el.querySelector(".push").addEventListener("click", () => push(s));
});
function toggleArm(mode) {
  if (over) return;
  if (mode === "arty" && artyCd > 0) return;
  if (mode === "gas" && gasCd > 0) return;
  if (mode === "tank" && (tankCd > 0 || tank)) return;
  armed = armed === mode ? null : mode;
  if (armed) hideTrenchIcons();
}
artyBtn.addEventListener("click", () => toggleArm("arty"));
gasBtn.addEventListener("click", () => toggleArm("gas"));
tankBtn.addEventListener("click", () => toggleArm("tank"));
document.addEventListener("keydown", e => {
  if (e.key === "1") toggleArm("arty");
  else if (e.key === "2") toggleArm("gas");
  else if (e.key === "3") toggleArm("tank");
  else if (e.key === "Escape") { armed = null; hideTrenchIcons(); }
});
cv.addEventListener("click", e => {
  const r = cv.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width), y = (e.clientY - r.top) * (H / r.height);
  if (!armed || over) {
    if (!over) {                               // tap support: pin icons on a held trench
      const hit = segHit(x, y);
      if (hit) { showTrenchIcons(hit.line, hit.sec); return; }
    }
    hideTrenchIcons();
    return;
  }
  if (armed === "arty") {
    armed = null; artyCd = 18;
    markers.push({ x, y, t: 0.9 });
    setTimeout(() => fireArtillery(x, y, 4, 0.75), 900);
  } else if (armed === "gas") {
    armed = null; gasCd = 30;
    markers.push({ x, y, t: 0.9 });
    setTimeout(() => gasStrike(x, y), 900);
  } else if (armed === "tank") {
    armed = null;
    deployTank(Math.min(SECTORS - 1, Math.floor(x / SEC_W)));
  }
});
document.getElementById("muteBtn").addEventListener("click", () => { muted = !muted; });
document.getElementById("restart").addEventListener("click", reset);

reset();
requestAnimationFrame(frame);
</script>
</body>
</html>
